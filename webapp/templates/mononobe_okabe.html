{% extends "base.html" %}
{% block title %}Mononobe-Okabe Calculator - GeoStructPy{% endblock %}
{% block content %}
<div id="app">
    <div class="card">
        <h2>Mononobe-Okabe Seismic Earth Pressure Calculator</h2>
        <div class="form-row">
            <div>
                <h3>Embankment Parameters</h3>
                <div class="form-group">
                    <label>Unit Weight of Soil, &gamma;<sub>moist</sub> (kN/m&sup3;)</label>
                    <input type="number" step="0.1" v-model.number="p.soil_weight">
                </div>
                <div class="form-group">
                    <label>Height of Embankment, H (m)</label>
                    <input type="number" step="0.01" v-model.number="p.h_wall">
                </div>
                <div class="form-group">
                    <label>Angle of Embankment Slope, &alpha; (deg)</label>
                    <input type="number" step="0.1" v-model.number="p.alpha">
                </div>
                <div class="form-group">
                    <label>Angle of Internal Friction, &phi; (deg)</label>
                    <input type="number" step="0.1" v-model.number="p.phi">
                </div>
                <div class="form-group">
                    <label>Angle of Wall Face from Horizontal, &beta; (deg)</label>
                    <input type="number" step="0.1" v-model.number="p.beta">
                </div>
                <div class="form-group">
                    <label>Wall-Soil Friction Angle, &delta; (deg)</label>
                    <input type="number" step="0.1" v-model.number="p.delta">
                </div>
            </div>
            <div>
                <h3>Seismic Parameters</h3>
                <div class="form-group">
                    <label>Peak Ground Acceleration, PGA (g)</label>
                    <input type="number" step="0.01" v-model.number="p.pga">
                </div>
                <div class="form-group">
                    <label>Horizontal Seismic Coefficient, k<sub>h</sub></label>
                    <input type="number" step="0.01" v-model.number="p.kh">
                </div>
                <div class="form-group">
                    <label>Vertical Seismic Coefficient, k<sub>v</sub></label>
                    <input type="number" step="0.01" v-model.number="p.kv">
                </div>

                <h3>Surcharge Parameters</h3>
                <div class="form-group">
                    <label>Type of Surcharge Loading</label>
                    <select v-model="p.surcharge_type">
                        <option>None</option>
                        <option>Uniform</option>
                        <option>Line</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Surcharge Load, q (kN/m&sup2;)</label>
                    <input type="number" step="0.1" v-model.number="p.surcharge_load">
                </div>
                <div class="form-group">
                    <label>Equivalent Height of Surcharge, H<sub>s</sub> (m)</label>
                    <input type="number" step="0.01" v-model.number="p.surcharge_height">
                </div>
            </div>
        </div>

        <div class="no-print">
            <button class="btn btn-accent" @click="calculate">Calculate</button>
            <button class="btn" @click="saveParams">Save</button>
            <button class="btn" @click="loadParams">Load</button>
            <button class="btn btn-print" @click="printReport()">Print Report</button>
        </div>
    </div>

    <div class="card" v-if="results.length">
        <h2>Results</h2>
        <div class="results-box">
            <div v-for="r in results" v-html="r"></div>
        </div>
        <div id="pressure-plot" style="margin-top:16px;"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const DEG = Math.PI / 180;
const { createApp } = Vue;

createApp({
    data() {
        return {
            p: {
                soil_weight: 7.2, h_wall: 1.35, alpha: 0, phi: 40,
                beta: 90, delta: 20, pga: 0.60, kh: 0.50, kv: 0.0,
                surcharge_type: 'None', surcharge_load: 0, surcharge_height: 0
            },
            results: []
        };
    },
    methods: {
        f: (v, d=3) => v.toFixed(d),
        calculate() {
            this.results = [];
            const {soil_weight:g, h_wall:H, alpha:a, phi:ph, beta:b, delta:d, pga, kh, kv} = this.p;

            // Seismic coefficients
            const kh_val = kh * pga;
            const kv_val = kv * pga;
            this.results.push(`<h4>Seismic Parameters</h4>
                \\[ k_h = ${this.f(kh_val)} \\quad k_v = ${this.f(kv_val)} \\]`);

            // Inclination angle theta
            const theta_rad = Math.atan(kh_val / (1 - kv_val));
            const theta = theta_rad / DEG;
            this.results.push(`<h4>Inclination Angle</h4>
                \\[ \\theta = \\arctan\\left(\\frac{k_h}{1-k_v}\\right) = \\arctan\\left(\\frac{${this.f(kh_val)}}{${this.f(1-kv_val)}}\\right) = ${this.f(theta)}^\\circ \\]`);

            // Ko
            const ko = 1 - Math.sin(ph * DEG);
            this.results.push(`<h4>At-Rest Earth Pressure Coefficient</h4>
                \\[ K_0 = 1 - \\sin\\phi = 1 - \\sin(${ph}^\\circ) = ${this.f(ko, 4)} \\]`);

            // Ka (static active)
            const ka_num = Math.pow(Math.sin((b + ph) * DEG), 2);
            const ka_den = Math.sin(b * DEG) * Math.sin((b - d) * DEG) * Math.pow(
                1 + Math.sqrt(Math.sin((ph + d) * DEG) * Math.sin((ph - a) * DEG) /
                (Math.sin((b - d) * DEG) * Math.sin((b + a) * DEG))), 2);
            const ka = ka_num / ka_den;
            this.results.push(`<h4>Static Active Pressure Coefficient (Coulomb)</h4>
                \\[ K_a = \\frac{\\sin^2(\\beta+\\phi)}{\\sin\\beta\\sin(\\beta-\\delta)\\left[1+\\sqrt{\\frac{\\sin(\\phi+\\delta)\\sin(\\phi-\\alpha)}{\\sin(\\beta-\\delta)\\sin(\\beta+\\alpha)}}\\right]^2} = ${this.f(ka, 5)} \\]`);

            // Kp (static passive)
            const kp_num = Math.pow(Math.sin((b - ph) * DEG), 2);
            const kp_inner = 1 - Math.sqrt(Math.sin((ph + d) * DEG) * Math.sin((ph + a) * DEG) /
                (Math.sin((b + d) * DEG) * Math.sin((b - a) * DEG)));
            const kp_den = Math.sin(b * DEG) * Math.sin((b + d) * DEG) * Math.pow(kp_inner, 2);
            const kp = kp_num / kp_den;
            this.results.push(`<h4>Static Passive Pressure Coefficient (Coulomb)</h4>
                \\[ K_p = \\frac{\\sin^2(\\beta-\\phi)}{\\sin\\beta\\sin(\\beta+\\delta)\\left[1-\\sqrt{\\frac{\\sin(\\phi+\\delta)\\sin(\\phi+\\alpha)}{\\sin(\\beta+\\delta)\\sin(\\beta+\\alpha)}}\\right]^2} = ${this.f(kp, 5)} \\]`);

            // Kae (seismic active)
            const kae_num = Math.pow(Math.sin((b + ph - theta) * DEG), 2);
            const kae_den = Math.cos(theta * DEG) * Math.sin(b * DEG) * Math.sin((b - d - theta) * DEG) *
                Math.pow(1 + Math.sqrt(Math.sin((ph + d) * DEG) * Math.sin((ph - a - theta) * DEG) /
                (Math.sin((b - d - theta) * DEG) * Math.sin((b + a) * DEG))), 2);
            const kae = kae_num / kae_den;
            this.results.push(`<h4>Seismic Active Pressure Coefficient (Mononobe-Okabe)</h4>
                \\[ K_{ae} = \\frac{\\sin^2(\\beta+\\phi-\\theta)}{\\cos\\theta\\sin\\beta\\sin(\\beta-\\delta-\\theta)\\left[1+\\sqrt{\\frac{\\sin(\\phi+\\delta)\\sin(\\phi-\\alpha-\\theta)}{\\sin(\\beta-\\delta-\\theta)\\sin(\\beta+\\alpha)}}\\right]^2} = ${this.f(kae, 5)} \\]`);

            // Delta Ka
            const dKa = kae * (1 - kv_val) - ka;
            this.results.push(`<h4>Dynamic Increment</h4>
                \\[ \\Delta K_a = K_{ae}(1-k_v) - K_a = ${this.f(dKa, 5)} \\]`);

            // Total forces
            const Pa_static = 0.5 * g * H * H * ka;
            const Pa_seismic = 0.5 * g * H * H * kae;
            this.results.push(`<h4>Earth Pressure Forces (per unit length)</h4>
                \\[ P_{a,static} = \\tfrac{1}{2}\\gamma H^2 K_a = ${this.f(Pa_static, 2)} \\text{ kN/m} \\]
                \\[ P_{a,seismic} = \\tfrac{1}{2}\\gamma H^2 K_{ae} = ${this.f(Pa_seismic, 2)} \\text{ kN/m} \\]`);

            this.$nextTick(() => {
                if (window.MathJax) MathJax.typeset();
                this.plotPressure(ka, kae, g, H);
            });
        },
        plotPressure(ka, kae, gamma, H) {
            const y = [], ps = [], pe = [];
            for (let i = 0; i <= 20; i++) {
                const z = (H / 20) * i;
                y.push(z);
                ps.push(gamma * z * ka);
                pe.push(gamma * z * kae);
            }
            Plotly.newPlot('pressure-plot', [
                {x: ps, y, mode:'lines', name:'Static (Ka)', line:{color:'#3498db',width:2}},
                {x: pe, y, mode:'lines', name:'Seismic (Kae)', line:{color:'#e74c3c',width:2}}
            ], {
                title:'Lateral Pressure Distribution',
                xaxis:{title:'Pressure (kPa)'},
                yaxis:{title:'Depth (m)', autorange:'reversed'},
                height:400,
                margin:{t:40,r:30,b:50,l:60}
            }, {responsive:true});
        },
        saveParams() {
            localStorage.setItem('mo_params', JSON.stringify(this.p));
            alert('Parameters saved.');
        },
        loadParams() {
            const s = localStorage.getItem('mo_params');
            if (s) { this.p = JSON.parse(s); alert('Parameters loaded.'); }
            else alert('No saved parameters found.');
        },
        printReport() { window.print(); }
    }
}).mount('#app');
</script>
{% endblock %}
